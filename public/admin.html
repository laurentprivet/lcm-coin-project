<!DOCTYPE html>
<html>
<head>

    <title>Admin Panel</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<a href="whitepaper.html">📄 Whitepaper</a>

<div class="container">

    <h1>🛠️ Admin Dashboard</h1>

    <!-- LOGIN -->
    <div id="adminLogin" class="card">

        <h3>Admin Login</h3>

        <input
            id="adminUser"
            placeholder="Username"
        >

        <input
            id="adminPass"
            type="password"
            placeholder="Password"
        >

        <button onclick="adminLogin()">
            Login
        </button>

        <p id="adminMsg"></p>

    </div>

    <!-- DASHBOARD -->
    <div id="adminPanel" class="card" style="display:none;">

        <!-- 📢 ANNOUNCEMENT -->
        <div class="card">

            <h3>📢 Send Announcement</h3>

            <textarea
                id="announcementText"
                placeholder="Write announcement..."
                style="
                    width:100%;
                    height:100px;
                    padding:10px;
                    border-radius:10px;
                    margin-top:10px;
                "
            ></textarea>

            <button onclick="sendAnnouncement()">
                Send Announcement
            </button>

        </div>

        <!-- 🎥 VIDEO -->
        <hr>

        <h3>🎥 Video Announcement</h3>

        <input type="file" id="videoFile">

        <button onclick="uploadVideo()">
            Upload Video
        </button>

        <p id="videoMsg"></p>

        <!-- ANALYTICS -->
        <div class="stats">

            <div class="stat-box">

                <h3 id="totalUsers">0</h3>

                <p>👥 Total Users</p>

            </div>

            <div class="stat-box">

                <h3 id="totalCoins">0</h3>

                <p>💰 Total Coins</p>

            </div>

            <div class="stat-box">

                <h3 id="onlineUsers">0</h3>

                <p>🟢 Online Users</p>

            </div>

            <div class="stat-box">

                <h3 id="totalMined">0</h3>

                <p>⛏️ Total Mined</p>

            </div>

        </div>

        <!-- USERS -->
        <h3>👥 All Users</h3>

        <table border="1" width="100%">

            <thead>

                <tr>

                    <th>Username</th>
                    <th>Coins</th>
                    <th>Level</th>
                    <th>Referrals</th>
                    <th>Action</th>
                    <th>Balance Control</th>

                </tr>

            </thead>

            <tbody id="userTable"></tbody>

        </table>

        <hr>

        <!-- LEADERBOARD -->
        <h3>🏆 Leaderboard</h3>

        <ul id="leaderboard"></ul>

        <hr>

        <!-- ACTIVE USERS -->
        <h3>🟢 Active Users</h3>

        <ul id="activeUsers"></ul>

    </div>

</div>

<script>

// ================= VIDEO UPLOAD =================
function uploadVideo() {

    const fileInput =
        document.getElementById("videoFile");

    const formData = new FormData();

    formData.append(
        "video",
        fileInput.files[0]
    );

    fetch("/upload-video", {

        method: "POST",

        body: formData

    })
    .then(res => res.json())
    .then(data => {

        document.getElementById(
            "videoMsg"
        ).innerText = data.message;

    });

}

// ================= SEND ANNOUNCEMENT =================
function sendAnnouncement() {

    const message =
        document.getElementById(
            "announcementText"
        ).value;

    fetch("/send-announcement", {

        method: "POST",

        headers: {
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            message
        })

    })
    .then(r => r.json())
    .then(d => {

        alert(d.message);

    });

}

let adminInterval = null;

// ================= ADMIN LOGIN =================
function adminLogin() {

    const username =
        document.getElementById(
            "adminUser"
        ).value;

    const password =
        document.getElementById(
            "adminPass"
        ).value;

    fetch("/admin-login", {

        method: "POST",

        headers: {
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            username,
            password
        })

    })
    .then(r => r.json())
    .then(d => {

        if (d.ok) {

            document.getElementById(
                "adminLogin"
            ).style.display = "none";

            document.getElementById(
                "adminPanel"
            ).style.display = "block";

            startAutoRefresh();

        } else {

            document.getElementById(
                "adminMsg"
            ).innerText = d.message;

        }

    });

}

// ================= AUTO REFRESH =================
function startAutoRefresh() {

    loadUsers();
    loadLeaderboard();
    loadActive();
    loadAnalytics();

    if (adminInterval) {

        clearInterval(adminInterval);

    }

    adminInterval = setInterval(() => {

        loadUsers();
        loadLeaderboard();
        loadActive();
        loadAnalytics();

    }, 3000);

}

// ================= LOAD USERS =================
function loadUsers() {

    fetch("/admin-users")
    .then(r => r.json())
    .then(users => {

        const table =
            document.getElementById(
                "userTable"
            );

        table.innerHTML = "";

        users.forEach(u => {

            table.innerHTML += `
                <tr>

                    <td>${u.username}</td>

                    <td>${u.coins}</td>

                    <td>${u.level}</td>

                    <td>${u.referrals.length}</td>

                    <td>

                        <button onclick="deleteUser('${u.username}')">
                            ❌ Delete
                        </button>

                        <button onclick="toggleBan('${u.username}')">
                            ${u.banned ? '✅ Unban' : '🚫 Ban'}
                        </button>

                    </td>

                    <td>

                        <button onclick="editBalance('${u.username}', 10)">
                            +10
                        </button>

                        <button onclick="editBalance('${u.username}', -10)">
                            -10
                        </button>

                    </td>

                </tr>
            `;

        });

    });

}

// ================= LEADERBOARD =================
function loadLeaderboard() {

    fetch("/leaderboard")
    .then(r => r.json())
    .then(users => {

        const list =
            document.getElementById(
                "leaderboard"
            );

        list.innerHTML = "";

        users.forEach((u, i) => {

            list.innerHTML += `
                <li>
                    #${i + 1} ${u.username} - ${u.coins} LCM
                </li>
            `;

        });

    });

}

// ================= ACTIVE USERS =================
function loadActive() {

    fetch("/active-users")
    .then(r => r.json())
    .then(users => {

        const list =
            document.getElementById(
                "activeUsers"
            );

        list.innerHTML = "";

        users.forEach(u => {

            list.innerHTML += `
                <li>🟢 ${u.username}</li>
            `;

        });

        document.getElementById(
            "onlineUsers"
        ).innerText = users.length;

    });

}

// ================= ANALYTICS =================
function loadAnalytics() {

    fetch("/admin-users")
    .then(r => r.json())
    .then(users => {

        document.getElementById(
            "totalUsers"
        ).innerText = users.length;

        let totalCoins = 0;
        let totalMined = 0;

        users.forEach(u => {

            totalCoins += u.coins;
            totalMined += u.totalMined;

        });

        document.getElementById(
            "totalCoins"
        ).innerText = totalCoins;

        document.getElementById(
            "totalMined"
        ).innerText = totalMined;

    });

}

// ================= DELETE USER =================
function deleteUser(username) {

    if (!confirm("Delete " + username + " ?")) {
        return;
    }

    fetch("/admin-delete-user", {

        method: "POST",

        headers: {
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            username
        })

    })
    .then(r => r.json())
    .then(d => {

        alert(d.message);

        loadUsers();
        loadLeaderboard();
        loadAnalytics();

    });

}

// ================= BAN / UNBAN =================
function toggleBan(username) {

    fetch("/admin-ban-user", {

        method: "POST",

        headers: {
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            username
        })

    })
    .then(r => r.json())
    .then(d => {

        alert(d.message);

        loadUsers();

    });

}

// ================= EDIT BALANCE =================
function editBalance(username, amount) {

    fetch("/admin-edit-balance", {

        method: "POST",

        headers: {
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            username,
            amount
        })

    })
    .then(r => r.json())
    .then(d => {

        alert(d.message);

        loadUsers();
        loadLeaderboard();
        loadAnalytics();

    });

}

</script>

</body>
</html>
