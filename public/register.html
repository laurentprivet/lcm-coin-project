<!DOCTYPE html>
<html>
<head>
    <title>Register - LCM Mining</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Create Account</h1>

    <div class="card">

        <input id="reg_name" placeholder="Full Name">
        <input id="reg_username" placeholder="Username">
        <input id="reg_email" placeholder="Email">
        <input id="reg_password" type="password" placeholder="Password">

        <!-- 🔥 REQUIRED REFERRAL -->
        <input id="reg_referral" placeholder="Referral Code" required>

        <button onclick="register()">Register</button>

        <a href="/">
            <button type="button">Back to Login</button>
        </a>

        <p id="msg"></p>

    </div>

</div>

<script>
    // ✅ AUTO REFERRAL FROM LINK
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");

    if (ref) {
        document.getElementById("reg_referral").value = ref;
    }

    // 🔥 REGISTER FUNCTION (FIXED)
    async function register() {
        const name = document.getElementById("reg_name").value;
        const username = document.getElementById("reg_username").value;
        const email = document.getElementById("reg_email").value;
        const password = document.getElementById("reg_password").value;
        const referral = document.getElementById("reg_referral").value;

        const res = await fetch("/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name,
                username,
                email,
                password,
                referral // 🔥 VERY IMPORTANT
            })
        });

        const text = await res.text();
        document.getElementById("msg").innerText = text;
    }
</script>

</body>
</html>
