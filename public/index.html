<!DOCTYPE html>
<html>
<head>
    <title>LCM Mining</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>⛏️ LCM Mining</h1>

    <!-- ================= AUTH SECTION ================= -->
    <div id="authSection" class="card">

        <h3>Account Access</h3>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <div class="buttons">
            <button onclick="login()">Login</button>
            <button onclick="openRegister()">Register</button>
        </div>

    </div>

    <!-- ================= DASHBOARD ================= -->
    <div id="dashboard" class="card" style="display:none;">

        <div class="actions">
            <button id="mineBtn" onclick="mine()">⛏️ Mine</button>
            <button onclick="upgrade()">⬆️ Upgrade</button>
        </div>

        <!-- 🪙 LCM COIN -->
<div class="coin-container">

    <div class="coin">

        <div class="coin-top">LIQUID CRYPTO MONEY</div>

        <div class="coin-center">LCM</div>

        <div class="coin-bottom">DIGITAL CURRENCY</div>

    </div>

</div>

        <!-- 💰 STATS -->
        <p>💰 Balance: <span id="balance">0</span> LCM</p>

        <p>⭐ Level: <span id="level">1</span></p>

        <!-- ⏳ COOLDOWN -->
        <p id="cooldown">⏳ Loading timer...</p>

        <!-- ⏳ CHECK TIME -->
        <button onclick="checkMineTime()">⏳ Check Time</button>

        <!-- 📢 MESSAGE -->
        <p id="message"></p>

        <!-- 🚪 LOGOUT -->
        <button onclick="logout()">🚪 Logout</button>

    </div>

    <!-- ================= REGISTER MODAL ================= -->
    <div id="registerModal" class="modal">

        <div class="modal-content">

            <h3>Create Account</h3>

            <input id="reg_name" placeholder="Full Name">
            <input id="reg_username" placeholder="Username">
            <input id="reg_email" placeholder="Email">
            <input id="reg_password" type="password" placeholder="Password">
            <input id="reg_referral" placeholder="Referral Code (optional)">

            <button onclick="register()">Register</button>
            <button onclick="closeRegister()">Close</button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
