<!DOCTYPE html>
<html>
<head>
    <title>LCM Mining</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>⛏️ LCM Mining</h1>

    <!-- ================= LOGIN SECTION ================= -->
    <div id="authSection" class="card">

        <h3>Account Access</h3>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <div class="buttons">
            <button onclick="login()">Login</button>

            <a href="/register">
                <button type="button">Register</button>
            </a>
        </div>

    </div>

    <!-- ================= DASHBOARD ================= -->
    <div id="dashboard" class="card" style="display:none;">

        <div class="actions">
            <!-- 🔥 FIX: ADD ID HERE -->
            <button id="mineBtn" onclick="mine()">⛏️ Mine</button>
            <button onclick="upgrade()">⬆️ Upgrade</button>
        </div>

        <!-- COIN -->
        <div class="coin-container">
            <div class="coin">

                <svg viewBox="0 0 200 200" class="coin-svg">
                    <path id="topCurve" d="M 30 100 A 70 70 0 0 1 170 100" fill="transparent"/>
                    <text>
                        <textPath href="#topCurve" startOffset="50%" text-anchor="middle">
                            LIQUID CRYPTO MONEY
                        </textPath>
                    </text>
                </svg>

                <div class="coin-inner">
                    <div class="coin-center">LCM</div>
                </div>

                <div class="coin-bottom">DIGITAL</div>

            </div>
        </div>

        <!-- STATS -->
        <p>💰 Balance: <span id="balance">0</span> LCM</p>
        <p>⭐ Level: <span id="level">1</span></p>

        <!-- 🔥 REFERRAL SECTION -->
        <p>👥 Referrals: <span id="refCount">0</span></p>
        <p>💰 Referral Earnings: <span id="refEarn">0</span> LCM</p>

        <p>🔗 Your Referral Link:</p>
        <input id="refLink" readonly>

        <button onclick="copyLink()">Copy Link</button>

        <!-- TIMER -->
        <p id="cooldown">⏳ Loading timer...</p>

        <!-- MESSAGE -->
        <p id="message"></p>

        <!-- LOGOUT -->
        <button onclick="logout()">🚪 Logout</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
