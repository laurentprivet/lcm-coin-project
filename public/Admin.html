<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🛠️ Admin Dashboard</h1>

    <!-- LOGIN -->
    <div id="adminLogin" class="card">
        <h3>Admin Login</h3>

        <input id="adminUser" placeholder="Username">
        <input id="adminPass" type="password" placeholder="Password">

        <button onclick="adminLogin()">Login</button>

        <p id="adminMsg"></p>
    </div>

    <!-- DASHBOARD -->
    <div id="adminPanel" class="card" style="display:none;">

        <h3>👥 All Users</h3>

        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Coins</th>
                    <th>Level</th>
                    <th>Referrals</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>

        <hr>

        <h3>🏆 Leaderboard</h3>
        <ul id="leaderboard"></ul>

        <hr>

        <h3>🟢 Active Users</h3>
        <ul id="activeUsers"></ul>

    </div>

</div>

<script>

let adminInterval = null;

// ================= ADMIN LOGIN =================
function adminLogin() {
    const username = document.getElementById("adminUser").value;
    const password = document.getElementById("adminPass").value;

    fetch("/admin-login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ username, password })
    })
    .then(r => r.json())
    .then(d => {
        if (d.ok) {
            document.getElementById("adminLogin").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";

            startAutoRefresh(); // 🔥 LIVE MODE START
        } else {
            document.getElementById("adminMsg").innerText = d.message;
        }
    });
}

// ================= AUTO REFRESH =================
function startAutoRefresh() {
    if (adminInterval) clearInterval(adminInterval);

    adminInterval = setInterval(() => {
        loadUsers();
        loadLeaderboard();
        loadActive();
    }, 3000); // every 3 sec
}

// ================= USERS =================
function loadUsers() {
    fetch("/admin-users")
    .then(r => r.json())
    .then(users => {

        const table = document.getElementById("userTable");
        table.innerHTML = "";

        users.forEach(u => {
            table.innerHTML += `
                <tr>
                    <td>${u.username}</td>
                    <td>${u.coins}</td>
                    <td>${u.level}</td>
                    <td>${u.referrals.length}</td>
                    <td>
    <button onclick="deleteUser('${u.username}')">
        ❌ Delete
    </button>

    <button onclick="toggleBan('${u.username}')">
        ${u.banned ? '✅ Unban' : '🚫 Ban'}
    </button>

</td>
            `;
        });
    });
}

// ================= LEADERBOARD =================
function loadLeaderboard() {
    fetch("/leaderboard")
    .then(r => r.json())
    .then(users => {

        const list = document.getElementById("leaderboard");
        list.innerHTML = "";

        users.forEach((u, i) => {
            list.innerHTML += `<li>#${i+1} ${u.username} - ${u.coins} LCM</li>`;
        });
    });
}

// ================= ACTIVE USERS =================
function loadActive() {
    fetch("/active-users")
    .then(r => r.json())
    .then(users => {

        const list = document.getElementById("activeUsers");
        list.innerHTML = "";

        users.forEach(u => {
            list.innerHTML += `<li>🟢 ${u.username}</li>`;
        });
    });
}

// ================= DELETE USER =================
function deleteUser(username) {

    if (!confirm("Delete " + username + " ?")) {
        return;
    }

    fetch("/admin-delete-user", {
        method: "POST",
        headers: {
            "Content-Type":"application/json"
        },
        body: JSON.stringify({ username })
    })
    .then(r => r.json())
    .then(d => {

        alert(d.message);

        loadUsers();

    });

}

// ================= BAN / UNBAN USER =================
function toggleBan(username) {

    fetch("/admin-ban-user", {
        method: "POST",
        headers: {
            "Content-Type":"application/json"
        },
        body: JSON.stringify({ username })
    })
    .then(r => r.json())
    .then(d => {

        alert(d.message);

        loadUsers();

    });

}

</script>

</body>
</html>
